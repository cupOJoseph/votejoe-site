tedAt":"2026-04-27T17:36:20.255714+00:00","linkedBlockId":null,"postStructure":[],"primaryBlockId":null,"lastTranslatedAt":null},"67b68adb-e352-481a-9b18-9a69d192302c":{"id":"67b68adb-e352-481a-9b18-9a69d192302c","data":{"text":"\u003ch2>About Joe\u003c/h2>\u003cspan class=\"image image-framed image-left image-tilt-left\" style=\"width: 37%;\">\u003cspan class=\"image-inner-wrapper\">\u003cimg src=\"https://run.imgix.net/3ec0a8a3-e781-4b41-a7e4-df6fe5211b46/02d1e91a-f407-48c9-b4ff-c7c34d77cb59/02d1e91a-f407-48c9-b4ff-c7c34d77cb59.jpg?ixlib=js-3.8.0&amp;bri=0&amp;con=0&amp;sat=0&amp;high=0&amp;shad=0&amp;usm=0&amp;rect=2122%2C1009%2C3574%2C3162&amp;w=1500\" alt=\"\" caption=\"\" align=\"left\" alignwidth=\"37\" tiltdirection=\"left\" variant=\"framed\">\u003c/span>\u003cspan class=\"caption\" style=\"display: none;\">\u003c/span>\u003c/span>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Joe Schiarizzi is an inventor, affordable housing activist, community organizer running for Congress in Virginia's 7th District.\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">As a regional lead for Yimbys of Nova, he has spent years in Virginia fighting for the specific reforms that actually get more affordable homes built. Joe chaired the Falls Church Environmental Sustainability Council, co-founded Bike Falls Church &amp; Falls Church Forward, and is a member of Arlington Young Democrats. He holds two patents, earned degrees in Naval Science &amp; Computer Science, and has conducted research on making computers more energy efficient. Joe founded Solarpunk VC, an investment syndicate that funds climate-focused startups and small businesses in Virginia, because he believes solving the climate crisis and the housing crisis go hand in hand.\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Growing up, Joe learned the value of hard work early. Joe's father was a union plumber and a Teamster in Local 25, and his mother worked the night shift at UPS loading boxes so their family could have healthcare. That's why Joe is running on a concrete, passable housing plan that uses existing federal tools to unlock affordable housing across the region.\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Joe is running on three pillars: \u003c/span>\u003cbr>\u003c/p>\u003col>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cu>Affordable Housing:\u003c/u> \u003c/strong>Declare a national housing emergency and fight for supply-side reforms that get affordable homes built near transit and jobs.\u003c/span>\u003c/p>\u003cp>\u003c/p>\u003c/li>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cu>Sustainability\u003c/u>: \u003c/strong>Confront the climate crisis by investing in clean energy, expanding public transit, and holding polluters to higher standards.\u003c/span>\u003c/p>\u003cp>\u003c/p>\u003c/li>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cu>Accountability\u003c/u>: \u003c/strong>Stand up to this corrupt administration and impeach President Trump on day 1.\u003c/span>\u003c/p>\u003c/li>\u003c/ol>","bgColor":"bg4","eyebrow":"Eyebrow Text Here","headline":"Headline Text Here","marginTop":"top-large","headlineOn":false,"description":"Description Text Here","eyebrowSize":0,"showEyebrow":false,"headlineSize":0,"marginBottom":"bottom-large","descriptionSize":0," g everywhere, and it's costing families, small businesses, and communities billions of dollars a year.\u003c/p>\u003cp>Joe Schiarizzi is calling for a constitutional amendment guaranteeing every American's Right to Repair, because laws get watered down and loopholes get carved out, but a constitutional right endures. The amendment would establish that you actually own what you buy, that repair information and parts must be available to owners and independent shops at fair prices, and that no manufacturer can void your warranty for choosing to fix your own stuff.\u003c/p>\u003cp>Right to Repair is not a left or right issue. It is a fairness issue, a climate issue, and a local jobs issue. Every product repaired instead of replaced is carbon not emitted, waste not landfilled, and money that stays in your community instead of flowing to corporate shareholders overseas.\u003c/p>","bgColor":"bg1","eyebrow":"Eyebrow Text Here","headline":"Headline Text Here","marginTop":"top-large","headlineOn":false,"description":"Description Text Here","eyebrowSize":0,"showEyebrow":false,"headlineSize":0,"marginBottom":"bottom-large","descriptionSize":0,"showDescription":false},"type":"BASIC_TEXT","title":"Text","pageId":"e4ae79bc-9a07-4ddd-a062-b2752885bf38","siteId":"3ec0a8a3-e781-4b41-a7e4-df6fe5211b46","deleted":false,"variant":null,"createdAt":"2026-04-14T18:44:03.592649+00:00","published":true,"updatedAt":"2026-04-27T17:36:20.255714+00:00","linkedBlockId":null,"postStructure":null,"primaryBlockId":null,"lastTranslatedAt":null},"10c42eb5-36d1-4fea-b90d-9fa1862cde09":{"id":"10c42eb5-36d1-4fea-b90d-9fa1862cde09","data":{"info":"\u003cp>Have a question? Don't be a stranger, contact us directly: team@votejoe.org\u003c/p>\u003cp>\u003cbr>\u003c/p>","bgColor":"bg4","marginTop":"top-large","disclaimer":"\u003cp>Paid for by Schiarizzi for Congress\u003c/p>","hideRunLink":true,"showPaidFor":true,"marginBottom":"bottom-large","poweredByText":"Powered by","showDescription":true,"shouldShowRunLogo":true},"type":"FOOTER","title":"Footer","pageId":"7ac24613-c9b7-40e4-a8af-093e06257c0a","siteId":"3ec0a8a3-e781-4b41-a7e4-df6fe5211b46","deleted":false,"variant":null,"createdAt":"2026-03-09T21:02:47.549+00:00","published":true,"updatedAt":"2026-04-27T17:36:20.255714+00:00","linkedBlockId":"ffdd2b7b-25a9-40f3-90f6-96a7f6a02a11","postStructure":[],"primaryBlockId":null,"lastTranslatedAt":null},"abf2a5de-6824-41af-a927-1f2ac79c7629":{"id":"abf2a5de-6824-41af-a927-1f2ac79c7629","data":{"text":"\u003ch2>\u003cstrong>Imagine common sense crypto policy and regulation, aligned with American dynamism.\u003c/strong>\u003c/h2>\u003cp style=\"text-align: left;\">\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Loans backed by Renewable Energy Certificates which fund new solar farms. Private payment rails between patients and doctors that ensure our rights to access any medical care. New economic models for funding the commons and mutual aid. These are all being built with blockchain technology in America today, and align with our long term values. Washington shouldn't stifle innovation or push jobs overseas.\u003c/strong>\u003c/span>\u003c/p>\u003ch3 style=\"text-align: left;\">\u003cspan style=\"color: var(--color-text-accent-secondary); text-decoration-color: var(--color-text-accent-secondary);\">Experience\u003c/span>\u003c/h3>\u003cp style=\"text-align: left;\">\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">After his family nearly lost their home in the Great Recession of 2008, Joe has supported creating a more open, fair, and transparent financial systems. Joe Schiarizzi is more than just a cryptobagholder, he is a builder. As an engineer, he has contributed to several Decentralized Finance protocols, and open source infrastructure that funds public goods.\u003c/strong>\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">More than 1% of the stored state of Ethereum was created by calling smart contracts Joe personally wrote. Using Tokenization technology he created the world's first loan collateralized entirely by American Renewable Energy Certificates. Joe believes financial vehicles like borrowing against stocks to avoid paying taxes or investing in startups shouldn't only be reserved for the super wealthy.&nbsp;\u003c/strong>\u003c/span>\u003c/p>\u003ch3 style=\"text-align: left;\">\u003cspan style=\"color: var(--color-text-accent-secondary); text-decoration-color: var(--color-text-accent-secondary);\">Policies\u003c/span>\u003c/h3>\u003cp style=\"text-align: left;\">\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">CLARITY and GENIUS are strong starts but leave gaps.\u003c/strong>\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Joe supports these common sense policy choices related to crypto in the US, and plans to push for them if elected to Congress.\u003c/strong>\u003c/span>\u003c/p>\u003col>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Clear rules on staking/mining income and how capital gains should be taxed.\u003c/strong>\u003c/span>\u003c/p>\u003c/li>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Simpler tax reporting for small crypto holders—everyday Americans shouldn't be penalized holding digital assets.\u003c/strong>\u003c/span>\u003c/p>\u003c/li>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Small businesses should be allowed to experiment with tokens without SEC consequences. A froyo shop's loyalty token isn't a securities offering.\u003c/strong>\u003c/span>\u003c/p>\u003c/li>\u003cli>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Expand eligible stablecoin collateral to include assets like municipal bonds that fuel American dynamism by funding hospitals, schools, roads, clean water, clean air, healthcare, sustainable energy projects, and more.\u003c/strong>\u003c/span>\u003c/p>\u003c/li>\u003c/ol>\u003cp>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">The Constitution charges our government with promoting the general welfare and securing the blessings of Liberty. Blockchain advances both missions by empowering Americans to coordinate more efficiently and openly. Stablecoins are now one of the largest buyers of US debt. Our long term monetary policy needs to reflect that reality.&nbsp;\u003c/strong>\u003c/span>\u003c/p>\u003cp>\u003cspan style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">\u003cstrong style=\"color: var(--color-text); text-decoration-color: var(--color-text);\">Washington must protect innovation, not regulate it overseas. Our goal should be to ensure every American can fairly and safely access the financial tools they need to succeed.\u003c/strong>\u003c/span>\u003c/p>\u003cp>\u003c/p>\u003cp>\u003c/p>","bgColor":"bg0","eyebrow":"Eyebrow Text Here","headline":"Headline Text Here","marginTop":"top-large","headlineOn":false,"description":"Description Text Here","eyebrowSize":-5,"showEyebrow":false,"headlineSize":0,"marginBottom":"bottom-large","descriptionSize":0,"showDescription":false,"charLimitsEnabled":true},"type":"BASIC_TEXT","title":"Text","pageId":"f753205f-b88a-4a2c-bbc4-f25c6e0351ec","siteId":"3ec0a8a3-e781-4b41-a7e4-df6fe5211b46","deleted":false,"variant":null,"createdAt":"2026-04-07T03:56:05.947437+00:00","published":true,"updatedAt":"2026-04-27T17:36:20.255714+00:00","linkedBlockId":null,"postStructure":null,"primaryBlockId":null,"lastTranslatedAt":null},"d6714d14-20aa-40ab-810c-07bf069f92ed":{"id":"d6714d14-20aa-40ab-810c-07bf069f92ed","data":{"info":"\u003cp>Have a question? Don't be a stranger, contact us directly: team@votejoe.org\u003c/p>\u003cp>\u003cbr>\u003c/p>","bgColor":"bg4","marginTop":"top-large","disclaimer":"\u003cp>Paid for by Schiarizzi for Congress\u003c/p>","hideRunLink":true,"showPaidFor":true,"marginBottom":"bottom-large","poweredByText":"Powered by","showDescription":true,"shouldShowRunLogo":true},"type":"FOOTER","title":"Footer","pageId":"de930630-be5d-40af-9184-f10ad187a8b0","siteId":"3ec0a8a3-e781-4b41-a7e4-df6fe5211b46","deleted":false,"variant":null,"createdAt":"2026-03-09T21:02:47.549+00:00","published":true,"updatedAt":"2026-04-27T17:36:20.255714+00:00","linkedBlockId":"ffdd2b7b-25a9-40f3-90f6-96a7f6a02a11","postStructure":[],"primaryBlockId":null,"lastTranslatedAt":null},"92d6f61b-70fe-4a68-816f-4cd75f7dd058":{"id":"92d6f61b-70fe-4a68-816f-4cd75f7dd058","data":{"info":"\u003cp>Have a question? Don't be a stranger, contact us directly: team@votejoe.org\u003c/p>\u003cp>\u003cbr>\u003c/p>","bgColor":"bg4","marginTop":"top-large","disclaimer":"\u003cp>Paid for by Schiarizzi for Congress\u003c/p>","hideRunLink":true,"showPaidFor":tru
