<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vote Joe Template Component Library</title>
    <link rel="stylesheet" href="/component-library/styles.css">
  </head>
  <body>
    <header class="library-header">
      <a href="/">Back to cloned site</a>
      <h1>Template Component Library</h1>
      <p>
        Reusable section functions generated from the published /template page data.
        Import /component-library/section-library.js and call renderSection(block) or one
        of the named section functions.
      </p>
    </header>
    <main id="catalog" class="catalog"></main>
    <script type="module">
      import { mountComponentLibrary } from "/component-library/section-library.js";
      mountComponentLibrary(document.getElementById("catalog"));
    </script>
  </body>
</html>
